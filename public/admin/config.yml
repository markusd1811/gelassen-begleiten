backend:
  name: github
  repo: markusd1811/gelassen-begleiten
  branch: main
  base_url: https://gelassen-begleiten.de
  
local_backend: true

media_folder: "public/images"
public_folder: "/images"

locale: "de"

collections:
  - name: "static_pages"
    label: "Website - Feste Inhalte"
    files:
      - label: "Startseite"
        name: "home"
        file: "src/data/home.json"
        fields:
          - label: "Hero Bereich"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Badge", name: "badge", widget: "string"}
              - {label: "Titel (Normal)", name: "title_main", widget: "string"}
              - {label: "Titel (Hervorgehoben)", name: "title_highlight", widget: "string"}
              - {label: "Untertitel", name: "subtitle", widget: "text"}
              - {label: "Bild", name: "image", widget: "image"}
          - label: "Problem Bereich"
            name: "problem"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Einleitungstext", name: "text", widget: "text"}
          - label: "Methoden Bereich"
            name: "methode"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "markdown"}
              - {label: "Bild", name: "image", widget: "image"}
          - label: "Über Mich"
            name: "about"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "markdown"}
              - {label: "Bild", name: "image", widget: "image"}
  - name: "blog"
    label: "Blog-Artikel (Problem-Seiten)"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    summary: '{{title}}'
    fields:
      - {label: "Titel (H1)", name: "title", widget: "string"}
      - {label: "SEO Title Tag", name: "seo_title", widget: "string", required: false}
      - {label: "SEO Meta Description", name: "seo_description", widget: "text", required: false}
      - {label: "Answer Capsule (GEO)", name: "answer_capsule", widget: "text", required: false}
      - {label: "Datum", name: "date", widget: "datetime", required: false}
      - {label: "Vorschaubild", name: "image", widget: "image", required: false}
      - {label: "Text", name: "body", widget: "markdown"}

  - name: "faq"
    label: "Häufige Fragen (FAQ)"
    folder: "src/content/faq"
    create: true
    slug: "{{slug}}"
    summary: '{{question}}'
    fields:
      - {label: "Frage", name: "question", widget: "string"}
      - {label: "Antwort", name: "answer", widget: "text"}
      - {label: "Kategorie", name: "category", widget: "select", options: ["Methode & Ansatz", "Ablauf & Formate", "Kosten & Buchung", "Für wen ist es geeignet"]}

  - name: "pages"
    label: "Eigene Unterseiten (Landingpages)"
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    summary: '{{title}}'
    fields:
      - {label: "Titel (H1)", name: "title", widget: "string"}
      - {label: "SEO Title Tag", name: "seo_title", widget: "string", required: false}
      - {label: "SEO Meta Description", name: "seo_description", widget: "text", required: false}
      - {label: "Hauptbild", name: "image", widget: "image", required: false}
      - {label: "Inhalt", name: "body", widget: "markdown"}
