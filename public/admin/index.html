<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Gelassen Begleiten | Content Management</title>
    <style>
        /* Login Page Branding */
        #nc-root [class^="nc-login-container"]::before {
            content: "";
            display: block;
            width: 180px;
            height: 80px;
            background: url('/images/logo_gb.png') no-repeat center;
            background-size: contain;
            margin: 0 auto 2rem;
        }

        /* Top Header Logo Styling - Refined to prevent overlap */
        header a[href="#/"],
        header [class*="AppHeaderLogo"],
        header [class*="LogoContainer"] {
            background: url('/images/logo_gb.png') no-repeat left center !important;
            background-size: contain !important;
            width: 180px !important;
            /* Increased width to accommodate logo + spacer */
            height: 34px !important;
            margin-right: 40px !important;
            /* More space to the first menu item */
            color: transparent !important;
            display: inline-block !important;
            position: relative !important;
            flex-shrink: 0 !important;
        }

        /* Ensure nav items are pushed to the right */
        header nav {
            margin-left: 20px !important;
        }

        /* Clean up the header appearance */
        header {
            padding: 0 20px !important;
        }
    </style>
</head>

<body>
    <!-- Include the German locale to prevent race conditions when using locale: "de" -->
    <script src="https://unpkg.com/decap-cms-locales@^3.0.0/dist/decap-cms-locales-de.js"></script>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
    <!-- Include Custom Previews and Styles -->
    <script src="cms.js"></script>
    <script>
        CMS.registerLocale('de', window.DecapCmsLocales.de);
    </script>
</body>

</html>
