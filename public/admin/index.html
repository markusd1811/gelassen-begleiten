<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Gelassen Begleiten | Content Management</title>
    <style>
        /* Login Page Branding */
        #nc-root [class^="nc-login-container"]::before {
            content: "";
            display: block;
            width: 180px;
            height: 80px;
            background: url('/images/logo_gb.png') no-repeat center;
            background-size: contain;
            margin: 0 auto 2rem;
        }

        /* Top Header Logo Styling - Absolute positioning to force space */
        #nc-root header>div {
            padding-left: 200px !important;
            /* Create guaranteed space for the logo */
            position: relative !important;
        }

        #nc-root header a[href="#/"] {
            position: absolute !important;
            left: 20px !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            display: block !important;
            width: 160px !important;
            height: 30px !important;
            background: url('/images/logo_gb.png') no-repeat left center !important;
            background-size: contain !important;
            color: transparent !important;
            z-index: 100;
        }

        /* Hide the original text if it still peeks through */
        #nc-root header a[href="#/"] * {
            display: none !important;
        }
    </style>
</head>

<body>
    <!-- Include the German locale to prevent race conditions when using locale: "de" -->
    <script src="https://unpkg.com/decap-cms-locales@^3.0.0/dist/decap-cms-locales-de.js"></script>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
    <!-- Include Custom Previews and Styles -->
    <script src="cms.js"></script>
    <script>
        CMS.registerLocale('de', window.DecapCmsLocales.de);
    </script>
</body>

</html>
