name: Deploy Astro Website to SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Astro Project
        run: npm run build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          # Der Ordner, den Astro nach dem Build erstellt:
          local_path: './dist/*'
          # WICHTIG: Passe den remote_path an deinen Zielordner auf dem Strato/IONOS Webspace an
          # Häufig ist das einfach '/' oder '/htdocs' oder '/DeinProjektOrdner'
          remote_path: '/gelassenbegleiten'
          sftp_only: true
          sftpArgs: '-o StrictHostKeyChecking=no'
