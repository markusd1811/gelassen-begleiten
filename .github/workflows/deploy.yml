name: Deploy Astro Website to SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Astro Project
        run: npm run build

      - name: High-Speed Delta Sync (SFTP)
        run: |
          sudo apt-get install -y lftp
          lftp -c "set sftp:auto-confirm yes; open -u ${{ secrets.SFTP_USER }},'${{ secrets.SFTP_PASSWORD }}' sftp://${{ secrets.SFTP_HOST }}; mirror -X .* -X .*/ -R ./dist/ /gelassenbegleiten/; quit"
